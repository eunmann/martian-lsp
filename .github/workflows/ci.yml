name: ci

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - name: lint
        run: make lint-check

  nvim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: nightly
      - name: headless nvim integration checks
        run: make test-nvim
