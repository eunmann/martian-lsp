name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          out="mrlsp-${{ matrix.goos }}-${{ matrix.goarch }}"
          [ "${{ matrix.goos }}" = "windows" ] && out="$out.exe"
          go build -ldflags "-s -w -X github.com/eunmann/martian-lsp/internal/server.Version=${GITHUB_REF_NAME}" -o "$out" ./cmd/mrlsp
          echo "ARTIFACT=$out" >> "$GITHUB_ENV"
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
          fail_on_unmatched_files: true

  vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: package .vsix
        working-directory: vscode
        run: |
          npm install
          npm run compile
          version="${GITHUB_REF_NAME#v}"
          npx @vscode/vsce package "$version" --no-git-tag-version \
            --out "../martian-lsp-${GITHUB_REF_NAME}.vsix"
      - name: attach .vsix to release
        uses: softprops/action-gh-release@v2
        with:
          files: martian-lsp-*.vsix
          fail_on_unmatched_files: true
      - name: publish to Open VSX (if token set)
        if: ${{ secrets.OVSX_TOKEN != '' }}
        working-directory: vscode
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: npx ovsx publish "../martian-lsp-${GITHUB_REF_NAME}.vsix" -p "$OVSX_TOKEN"
      - name: publish to VS Code Marketplace (if token set)
        if: ${{ secrets.VSCE_PAT != '' }}
        working-directory: vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath "../martian-lsp-${GITHUB_REF_NAME}.vsix" -p "$VSCE_PAT"
