name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          out="mrlsp-${{ matrix.goos }}-${{ matrix.goarch }}"
          [ "${{ matrix.goos }}" = "windows" ] && out="$out.exe"
          go build -ldflags "-s -w -X github.com/eunmann/martian-lsp/internal/server.Version=${GITHUB_REF_NAME}" -o "$out" ./cmd/mrlsp
          echo "ARTIFACT=$out" >> "$GITHUB_ENV"
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
          fail_on_unmatched_files: true
